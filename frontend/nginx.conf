# --------------------------------------------------------------------------
# Nginx 設定ファイル — HTTPS (自己署名証明書) + HTTP→HTTPS リダイレクト
#
# 役割:
#   1. ブラウザからの静的ファイル配信 (Angular SPA)
#   2. /api/* リクエストを FastAPI バックエンドへリバースプロキシ
#   3. HTTPS 終端 (TLS 1.2 / 1.3)
#   4. HTTP (80) → HTTPS (443) への 301 リダイレクト
#
# リクエストフロー:
#   ブラウザ → :443 (HTTPS) → Nginx
#     ├─ /api/*  → proxy_pass → http://backend:8000 (FastAPI)
#     └─ /*      → Angular SPA (index.html フォールバック)
# --------------------------------------------------------------------------

# ── HTTP → HTTPS リダイレクト ──
# ブラウザが http://localhost:4200 にアクセスした場合、
# 自動的に https://localhost:4443 へ転送する。
server {
    listen 80;
    server_name _;

    # 301 (恒久的リダイレクト) で HTTPS へ転送
    return 301 https://$host:4443$request_uri;
}

# ── メインの HTTPS サーバー ──
server {
    listen 443 ssl;
    server_name _;

    # --- TLS 証明書 ---
    # generate-cert.sh で生成された自己署名証明書を使用
    ssl_certificate     /etc/nginx/certs/server.crt;
    ssl_certificate_key /etc/nginx/certs/server.key;

    # --- TLS プロトコル設定 ---
    # TLS 1.2 以上のみ許可 (1.0/1.1 は脆弱性があるため無効化)
    ssl_protocols TLSv1.2 TLSv1.3;

    # サーバー側の暗号スイート優先順位を使用
    ssl_prefer_server_ciphers on;

    # --- 静的ファイル配信 (Angular SPA) ---
    root /usr/share/nginx/html;
    index index.html;

    # --- API リバースプロキシ ---
    # /api/ で始まるリクエストを FastAPI バックエンドへ転送する。
    # Docker Compose のサービス名 "backend" で名前解決される。
    location /api/ {
        proxy_pass http://backend:8000;

        # クライアントの実 IP をバックエンドに伝える
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # HTTPS 経由であることをバックエンドに伝える
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- SPA フォールバック ---
    # Angular のクライアントサイドルーティングに対応。
    # 存在しないパスへのリクエストは index.html に転送し、
    # Angular Router がクライアント側でルーティングする。
    location / {
        try_files $uri $uri/ /index.html;
    }
}
